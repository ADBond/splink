name: typechecking
on:
  pull_request:
    paths:
      - splink/**
      - tests/**
      - pyproject.toml
      - uv.lock

permissions: {}

jobs:
  typecheck-mypy:
    name: typecheck-mypy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        id: setup_uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install Python 3.12
        id: install_python312
        run: uv python install 3.12

      - name: Install dependencies
        id: install_dependencies
        run: uv sync --python 3.12 --group typechecking

      - name: Run mypy
        id: mypy
        run: make typecheck

  typecheck-ty:
    name: typecheck-ty
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        id: setup_uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install Python 3.12
        id: install_python312
        run: uv python install 3.12

      - name: Install dependencies
        id: install_dependencies
        run: uv sync --python 3.12 --group typechecking-dev

      - name: Run ty
        id: ty
        run: make typecheck-dev
